<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - NattDev Payment System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .register-container {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            padding: 2rem;
        }
        .input-field {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 1rem;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }
        .input-field:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .role-option {
            padding: 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .role-option:hover {
            border-color: #6366f1;
            background-color: #f0f4ff;
        }
        .role-option.selected {
            border-color: #6366f1;
            background-color: #f0f4ff;
            font-weight: 600;
        }
        .role-option input {
            display: none;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 0.5rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .btn-primary {
            background-color: #6366f1;
            color: white;
        }
        .btn-primary:hover {
            background-color: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }
        .error-message {
            background-color: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: none;
        }
        .success-message {
            background-color: #dcfce7;
            color: #15803d;
            padding: 12px;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: none;
        }
        .error-message.show, .success-message.show {
            display: block;
        }
    </style>
</head>
<body>

<div class="register-container">
    <!-- Logo -->
    <div style="text-align: center; margin-bottom: 2rem;">
        <div style="font-size: 3rem; margin-bottom: 1rem;">💳</div>
        <h1 style="font-size: 1.5rem; font-weight: 900; color: #6366f1;">NattDev</h1>
        <p style="color: #6b7280; margin-top: 0.5rem;">สมัครสมาชิกใหม่ฟรี</p>
    </div>

    <!-- Messages -->
    <div id="errorMessage" class="error-message">
        <strong>เกิดข้อผิดพลาด</strong>
        <p id="errorText"></p>
    </div>
    <div id="successMessage" class="success-message">
        <strong>✓ สมัครสำเร็จ!</strong>
        <p id="successText">กำลังไปยังหน้าแรก...</p>
    </div>

    <!-- Form -->
    <form id="registerForm">
        <!-- Email -->
        <div style="margin-bottom: 1rem;">
            <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #1f2937;">
                Email
            </label>
            <input
                type="email"
                id="email"
                class="input-field"
                placeholder="your@email.com"
                required
            >
            <small style="color: #9ca3af;">เราจะใช้อีเมลนี้เพื่อติดต่อคุณ</small>
        </div>

        <!-- Password -->
        <div style="margin-bottom: 1rem;">
            <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #1f2937;">
                Password
            </label>
            <input
                type="password"
                id="password"
                class="input-field"
                placeholder="••••••••"
                required
            >
            <small style="color: #9ca3af;">อย่างน้อย 8 ตัวอักษร มีตัวพิมพ์ใหญ่ + ตัวเลข</small>
        </div>

        <!-- Confirm Password -->
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #1f2937;">
                ยืนยัน Password
            </label>
            <input
                type="password"
                id="confirmPassword"
                class="input-field"
                placeholder="••••••••"
                required
            >
        </div>

        <!-- Role Selection -->
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #1f2937;">
                ฉันคือ (เลือกบทบาท)
            </label>
            <div class="role-selector">
                <label class="role-option">
                    <input type="radio" name="role" value="shop" checked onchange="updateRole(this)">
                    <div style="font-size: 1.5rem; margin-bottom: 0.5rem;">🏪</div>
                    <div>ร้านค้า</div>
                    <small style="display: block; color: #9ca3af; font-size: 0.8rem;">รับเงินออนไลน์</small>
                </label>
                <label class="role-option">
                    <input type="radio" name="role" value="affiliate" onchange="updateRole(this)">
                    <div style="font-size: 1.5rem; margin-bottom: 0.5rem;">🤝</div>
                    <div>Affiliate</div>
                    <small style="display: block; color: #9ca3af; font-size: 0.8rem;">หา Commission</small>
                </label>
                <label class="role-option">
                    <input type="radio" name="role" value="developer" onchange="updateRole(this)">
                    <div style="font-size: 1.5rem; margin-bottom: 0.5rem;">⚙️</div>
                    <div>Developer</div>
                    <small style="display: block; color: #9ca3af; font-size: 0.8rem;">ใช้ API</small>
                </label>
            </div>
        </div>

        <!-- Terms & Conditions -->
        <div style="margin-bottom: 1.5rem; display: flex; align-items: center;">
            <input
                type="checkbox"
                id="terms"
                required
                style="width: 18px; height: 18px; cursor: pointer;"
            >
            <label for="terms" style="margin-left: 0.5rem; cursor: pointer; color: #6b7280; font-size: 0.9rem;">
                ฉันยอมรับ
                <a href="#" style="color: #6366f1; text-decoration: none;">ข้อตกลง</a>
                และ
                <a href="#" style="color: #6366f1; text-decoration: none;">นโยบายความเป็นส่วนตัว</a>
            </label>
        </div>

        <!-- Register Button -->
        <button type="submit" class="btn btn-primary" style="margin-bottom: 1rem;">
            สมัครสมาชิก
        </button>
    </form>

    <!-- Links -->
    <div style="text-align: center;">
        <p style="color: #6b7280;">
            มีบัญชีแล้ว?
            <a href="login.html" style="color: #6366f1; font-weight: 600; text-decoration: none;">
                เข้าสู่ระบบ
            </a>
        </p>
    </div>
</div>

<script>
    // Update role selection styling
    function updateRole(element) {
        document.querySelectorAll('.role-option').forEach(opt => {
            opt.classList.remove('selected');
        });
        element.parentElement.classList.add('selected');
    }

    // Mark first role as selected
    document.querySelectorAll('.role-option')[0].classList.add('selected');

    // Form submission
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const role = document.querySelector('input[name="role"]:checked').value;

        // Reset messages
        document.getElementById('errorMessage').classList.remove('show');
        document.getElementById('successMessage').classList.remove('show');

        // Validation
        if (password.length < 8) {
            showError('Password ต้องมีอย่างน้อย 8 ตัวอักษร');
            return;
        }

        if (password !== confirmPassword) {
            showError('Password ไม่ตรงกัน กรุณาตรวจ��อบ');
            return;
        }

        if (!/[A-Z]/.test(password)) {
            showError('Password ต้องมีตัวพิมพ์ใหญ่ (A-Z)');
            return;
        }

        if (!/[0-9]/.test(password)) {
            showError('Password ต้องมีตัวเลข (0-9)');
            return;
        }

        try {
            // Simulate API call
            await new Promise(resolve => setTimeout(resolve, 1500));

            // Show success
            document.getElementById('successMessage').classList.add('show');
            document.getElementById('registerForm').style.display = 'none';

            // Redirect after 2 seconds
            setTimeout(() => {
                localStorage.setItem('authToken', 'demo-token-' + Date.now());
                if (role === 'shop') {
                    window.location.href = 'dashboard-shop.html';
                } else if (role === 'affiliate') {
                    window.location.href = 'dashboard-affiliate.html';
                } else {
                    window.location.href = 'dashboard-admin.html';
                }
            }, 2000);

        } catch (error) {
            showError(error.message);
        }
    });

    function showError(message) {
        document.getElementById('errorMessage').classList.add('show');
        document.getElementById('errorText').textContent = message;
    }
</script>

</body>
</html>
