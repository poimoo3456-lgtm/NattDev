<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NattDev Payment System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }
        .input-field {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 1rem;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }
        .input-field:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 0.5rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .btn-primary {
            background-color: #6366f1;
            color: white;
        }
        .btn-primary:hover {
            background-color: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }
        .error-message {
            background-color: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .loading {
            display: none;
            text-align: center;
            color: #6366f1;
        }
        .spinner {
            border: 3px solid rgba(99, 102, 241, 0.1);
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="login-container">
    <!-- Logo -->
    <div style="text-align: center; margin-bottom: 2rem;">
        <div style="font-size: 3rem; margin-bottom: 1rem;">💳</div>
        <h1 style="font-size: 1.5rem; font-weight: 900; color: #6366f1;">NattDev</h1>
        <p style="color: #6b7280; margin-top: 0.5rem;">เข้าสู่ร��บบเพื่อใช้งาน</p>
    </div>

    <!-- Error Message -->
    <div id="errorMessage" class="error-message">
        <strong>เกิดข้อผิดพลาด</strong>
        <p id="errorText"></p>
    </div>

    <!-- Loading -->
    <div id="loadingSpinner" class="loading">
        <div class="spinner"></div>
        <p>กำลังตรวจสอบข้อมูล...</p>
    </div>

    <!-- Form -->
    <form id="loginForm" style="display: none;">
        <!-- Email -->
        <div style="margin-bottom: 1rem;">
            <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #1f2937;">
                Email
            </label>
            <input
                type="email"
                id="email"
                class="input-field"
                placeholder="your@email.com"
                required
            >
        </div>

        <!-- Password -->
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #1f2937;">
                Password
            </label>
            <input
                type="password"
                id="password"
                class="input-field"
                placeholder="••••••••"
                required
            >
        </div>

        <!-- Remember Me -->
        <div style="margin-bottom: 1.5rem; display: flex; align-items: center;">
            <input
                type="checkbox"
                id="rememberMe"
                style="width: 18px; height: 18px; cursor: pointer;"
            >
            <label for="rememberMe" style="margin-left: 0.5rem; cursor: pointer; color: #6b7280;">
                จำรหัสผ่านไว้
            </label>
        </div>

        <!-- Login Button -->
        <button type="submit" class="btn btn-primary" style="margin-bottom: 1rem;">
            เข้าสู่ระบบ
        </button>
    </form>

    <!-- Divider -->
    <div style="text-align: center; color: #d1d5db; margin: 1.5rem 0;">
        หรือ
    </div>

    <!-- Social Login -->
    <button style="width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 0.5rem; margin-bottom: 1rem; cursor: pointer; transition: all 0.3s; background-color: #f9fafb;" onmouseover="this.style.backgroundColor='#f3f4f6'" onmouseout="this.style.backgroundColor='#f9fafb'">
        🔐 เข้าด้วย Google
    </button>

    <!-- Links -->
    <div style="text-align: center; space-y: 1rem;">
        <p style="color: #6b7280; margin-bottom: 1rem;">
            ยังไม่มีบัญชี?
            <a href="register.html" style="color: #6366f1; font-weight: 600; text-decoration: none;">
                สมัครสมาชิก
            </a>
        </p>
        <a href="#" style="color: #6366f1; font-weight: 600; text-decoration: none; font-size: 0.9rem;">
            ลืมรหัสผ่าน?
        </a>
    </div>
</div>

<script>
    // Form validation
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const rememberMe = document.getElementById('rememberMe').checked;

        // Reset error
        document.getElementById('errorMessage').classList.remove('show');

        // Show loading
        document.getElementById('loadingSpinner').style.display = 'block';
        document.getElementById('loginForm').style.display = 'none';

        try {
            // Simulate API call
            await new Promise(resolve => setTimeout(resolve, 1500));

            // Check credentials (demo)
            if (email === 'admin@nattdev.com' && password === 'admin123') {
                localStorage.setItem('authToken', 'demo-token-' + Date.now());
                if (rememberMe) {
                    localStorage.setItem('rememberEmail', email);
                }
                // Redirect to dashboard
                window.location.href = 'dashboard-admin.html';
            } else if (email === 'shop@nattdev.com' && password === 'shop123') {
                localStorage.setItem('authToken', 'demo-token-' + Date.now());
                if (rememberMe) {
                    localStorage.setItem('rememberEmail', email);
                }
                window.location.href = 'dashboard-shop.html';
            } else {
                throw new Error('Email หรือ Password ไม่ถูกต้อง');
            }
        } catch (error) {
            document.getElementById('loadingSpinner').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('errorMessage').classList.add('show');
            document.getElementById('errorText').textContent = error.message;
        }
    });

    // Show form after load
    window.addEventListener('load', () => {
        document.getElementById('loginForm').style.display = 'block';
        const savedEmail = localStorage.getItem('rememberEmail');
        if (savedEmail) {
            document.getElementById('email').value = savedEmail;
        }
    });
</script>

</body>
</html>
